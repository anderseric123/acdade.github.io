
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f5f6f7" />
  <title>盘中异动·1分钟看懂</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --text-main: #18202c;
      --text-muted: #5d6574;
      --text-light: #8a93a1;
      --accent: #ff2442;
      --shadow-sm: 0 2px 8px rgba(20, 27, 38, 0.04);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: "Source Han Sans", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(100%, 480px);
      margin: 0 auto;
      padding-bottom: calc(120px + env(safe-area-inset-bottom));
    }

    /* === 吸顶头部与日历 === */
    .header-container {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(248, 249, 250, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: calc(16px + env(safe-area-inset-top)) 14px 16px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.03);
    }

    .header__topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 0 4px;
    }

    .header__title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 23px;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.02em;
      line-height: 1.1;
      flex: 1;
      min-width: 0;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255, 36, 66, 0.1);
      color: #ff2442;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
      transform: translateY(1px);
    }

    .live-badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ff2442;
      box-shadow: 0 0 0 3px rgba(255, 36, 66, 0.14);
    }

    .header__logo {
      flex: 0 0 auto;
      width: 76px;
      height: 16px;
      opacity: 0.95;
      display: block;
    }

    .calendar {
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .calendar__toggle {
      width: 100%;
      appearance: none;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
    }

    .calendar__toggle-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .calendar__icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      color: #4b5563;
    }

    .calendar__icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .calendar__summary {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .calendar__summary-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
    }

    .calendar__summary-value {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-main);
    }

    .calendar__toggle-arrow {
      color: var(--text-light);
      font-size: 12px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .calendar.is-open .calendar__toggle-arrow { transform: rotate(180deg); }

    .calendar__panel {
      display: none;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      padding: 16px;
    }
    .calendar.is-open .calendar__panel { display: block; }

    .calendar__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .calendar__month-value { font-size: 16px; font-weight: 800; }

    .calendar__nav-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: #f0f2f5;
      color: var(--text-main);
      font-size: 16px;
      cursor: pointer;
    }

    .calendar__weekdays, .calendar__grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
    }

    .calendar__weekday {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .calendar__cell {
      appearance: none;
      border: none;
      background: transparent;
      padding: 8px 0;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      position: relative;
    }

    .calendar__cell.is-outside { color: #c4c9d1; }
    .calendar__cell.is-active { background: var(--text-main); color: #fff; }
    .calendar__cell.is-today::after {
      content: "";
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* === 瀑布流内容区 === */
    .feed-container { padding: 16px 14px; }
    .date-section { margin-bottom: 32px; scroll-margin-top: 120px; }

    .date-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .date-header::before {
      content: '';
      display: block;
      width: 4px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    .waterfall {
      column-count: 2;
      column-gap: 10px;
    }

    .xhs-card {
      break-inside: avoid;
      background: var(--card);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,0.03);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .xhs-card:active { transform: scale(0.98); }

    /* 优化：固定 1:1 比例，并让图片顶部对齐以裁剪底部二维码 */
    .xhs-card__image {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      background: #f0f2f5;
      object-fit: cover;
      object-position: top; /* 关键修改：图片靠顶部对齐，超出部分从底部裁切 */
    }

    .xhs-card__body {
      padding: 8px 10px 12px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .xhs-card__title {
      font-size: 12.5px;
      font-weight: 700;
      color: var(--text-light);
      line-height: 1.45;
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      text-align: right;
    }

    .empty-state {
      text-align: center;
      padding: 40px 0;
      color: var(--text-light);
      font-size: 14px;
    }

    /* === 大图查看器 (Modal) === */
    .image-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 20, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .image-viewer.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .viewer-close {
      position: absolute;
      top: calc(16px + env(safe-area-inset-top));
      right: 16px;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 300;
      cursor: pointer;
      z-index: 10;
    }

    .image-viewer__img-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .image-viewer__img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transform: scale(0.95);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .image-viewer.is-active .image-viewer__img {
      transform: scale(1);
    }

    .disclaimer {
      margin: 0 14px 6px;
      padding: 0 4px 4px;
      background: transparent;
      border: none;
      box-shadow: none;
      color: var(--text-light);
      font-size: 11px;
      line-height: 1.55;
    }

    .disclaimer__title {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 2px;
    }

    .fixed-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 -5px 20px -5px rgba(0, 0, 0, 0.1);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .fixed-actions__inner {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .action-btn {
      flex: 1;
      min-height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
      text-decoration: none;
      line-height: 1;
      user-select: none;
    }

    .action-btn:active {
      transform: scale(0.97);
      opacity: 0.92;
    }

    .action-btn--share {
      display: none;
      color: #f5d77a;
      background: linear-gradient(135deg, #0f172a, #111827);
      border: 1px solid rgba(245, 215, 122, 0.4);
    }

    .action-btn--share.is-app {
      display: flex;
    }

    .action-btn--download {
      color: #19202b;
      background: linear-gradient(90deg, #f8d46a 0%, #f2c94c 45%, #f8d46a 100%);
      box-shadow: 0 8px 18px rgba(242, 201, 76, 0.22);
    }

    .action-btn__text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .action-btn__subtext {
      font-size: 10px;
      font-weight: 500;
      opacity: 0.78;
      transform: scale(0.92);
    }

    .action-btn__icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
  </style>
</head>

    const state = {
      viewYear: currentYear,
      viewMonth: currentMonthIndex,
      selectedKey: todayKey
    };

    const calendarGrid = document.getElementById('calendarGrid');
    const calendarMonth = document.getElementById('calendarMonth');
    const calendarSummary = document.getElementById('calendarSummary');
    const calendarRoot = document.getElementById('calendarRoot');
    const calendarToggle = document.getElementById('calendarToggle');
    const calendarWeekdays = document.getElementById('calendarWeekdays');
    const feedContainer = document.getElementById('feedContainer');
    const sharePageBtn = document.getElementById('sharePageBtn');
    const downloadBtn = document.getElementById('download-btn');

    function formatFullDate(key) {
      const [year, month, day] = key.split('-');
      return `${year}年${parseInt(month)}月${parseInt(day)}日`;
    }

    function formatShortDate(key) {
      const [year, month, day] = key.split('-');
      return `${parseInt(month)}月${parseInt(day)}日`;
    }

    function dateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function buildMonthCells(year, monthIndex) {
      const firstDay = new Date(year, monthIndex, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const cells = [];

      for (let i = startWeekday - 1; i >= 0; i--) {
        const d = new Date(year, monthIndex, -i);
        cells.push({ date: d, outside: true });
      }
      for (let day = 1; day <= daysInMonth; day++) {
        cells.push({ date: new Date(year, monthIndex, day), outside: false });
      }
      while (cells.length % 7 !== 0) {
        cells.push({ date: new Date(year, monthIndex + 1, cells.length - startWeekday - daysInMonth + 1), outside: true });
      }
      return cells;
    }

    function renderCalendar() {
      calendarMonth.textContent = `${state.viewYear}年${state.viewMonth + 1}月`;
      calendarWeekdays.innerHTML = WEEKDAY_LABELS.map(l => `<div class="calendar__weekday">${l}</div>`).join('');

      const cells = buildMonthCells(state.viewYear, state.viewMonth);
      calendarGrid.innerHTML = cells.map(cell => {
        const key = dateKey(cell.date);
        const isActive = key === state.selectedKey;
        const isToday = key === todayKey;
        
        let classes = ['calendar__cell'];
        if (cell.outside) classes.push('is-outside');
        if (isActive) classes.push('is-active');
        if (isToday) classes.push('is-today');

        return `<button class="${classes.join(' ')}" data-date="${key}">${cell.date.getDate()}</button>`;
      }).join('');
    }

    function renderFeed() {
      const sortedDates = Object.keys(cardStore).sort((a, b) => new Date(b) - new Date(a));
      
      if (sortedDates.length === 0) {
        feedContainer.innerHTML = '<div class="empty-state">暂无盘中异动数据</div>';
        return;
      }

      let html = '';
      sortedDates.forEach(dateStr => {
        const items = cardStore[dateStr];
        const dateLabel = dateStr === todayKey ? `今天 (${formatShortDate(dateStr)})` : formatFullDate(dateStr);

        function buildCardTitle(item) {
          return '查看详情>';
        }
        
        html += `
          <div class="date-section" id="section-${dateStr}">
            <div class="date-header">${dateLabel}</div>
            <div class="waterfall">
              ${items.map(item => `
                <article class="xhs-card" data-image="${item.image}">
                  <img class="xhs-card__image" src="${item.image}" alt="${item.title}" loading="lazy">
                  <div class="xhs-card__body">
                    <div class="xhs-card__title">${buildCardTitle(item)}</div>
                  </div>
                </article>
              `).join('')}
            </div>
          </div>
        `;
      });
      feedContainer.innerHTML = html;
    }

    calendarToggle.addEventListener('click', () => {
      calendarRoot.classList.toggle('is-open');
    });

    calendarGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('.calendar__cell');
      if (!btn) return;
      
      const targetDate = btn.dataset.date;
      state.selectedKey = targetDate;
      calendarSummary.textContent = formatFullDate(targetDate);
      
      renderCalendar();
      calendarRoot.classList.remove('is-open');

      const targetSection = document.getElementById(`section-${targetDate}`);
      if (targetSection) {
        targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        alert(`${formatFullDate(targetDate)} 暂无数据`);
      }
    });

    document.getElementById('prevMonth').addEventListener('click', () => {
      state.viewMonth--;
      if (state.viewMonth < 0) { state.viewMonth = 11; state.viewYear--; }
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      state.viewMonth++;
      if (state.viewMonth > 11) { state.viewMonth = 0; state.viewYear++; }
      renderCalendar();
    });

    document.addEventListener('click', (e) => {
      if (calendarRoot.classList.contains('is-open') && !calendarRoot.contains(e.target)) {
        calendarRoot.classList.remove('is-open');
      }
    });

    renderCalendar();
    renderFeed();

    /* === 大图查看器交互逻辑 === */
    const imageViewer = document.getElementById('imageViewer');
    const viewerImg = document.getElementById('viewerImg');
    let currentImgUrl = '';

    // 监听卡片点击事件
    feedContainer.addEventListener('click', (e) => {
      const card = e.target.closest('.xhs-card');
      if (!card) return;
      
      const imgUrl = card.getAttribute('data-image');
      if (imgUrl) {
        currentImgUrl = imgUrl;
        viewerImg.src = imgUrl;
        imageViewer.classList.add('is-active');
      }
    });

    // 关闭查看器
    function closeViewer() {
      imageViewer.classList.remove('is-active');
      setTimeout(() => { viewerImg.src = ''; }, 300); // 等待动画结束后清空 src
    }

    document.getElementById('viewerClose').addEventListener('click', closeViewer);
    document.getElementById('viewerImgContainer').addEventListener('click', (e) => {
      // 点击图片外围区域也可以关闭
      if (e.target !== viewerImg) {
        closeViewer();
      }
    });

    function handleSharePage() {
      if (typeof window.Jin10JSBridge !== 'undefined') {
        try {
          const bridge = new window.Jin10JSBridge();
          if (bridge.isApp) {
            bridge.dispatch('appShare', { url: location.href });
            return;
          }
        } catch (e) {
          // Fall back to browser sharing below.
        }
      }

      if (navigator.share) {
        navigator.share({
          title: document.title,
          url: location.href
        }).catch(() => {});
        return;
      }

      navigator.clipboard.writeText(location.href).then(() => {
        alert('页面链接已复制到剪贴板！');
      }).catch(() => {
        alert('复制失败，请重试');
      });
    }

    function initAppEnvironment() {
      if (typeof window.Jin10JSBridge !== 'undefined') {
        try {
          const bridge = new window.Jin10JSBridge();
          if (bridge.isApp) {
            if (sharePageBtn) sharePageBtn.style.display = '';
            if (downloadBtn) downloadBtn.style.display = 'none';
            if (sharePageBtn) sharePageBtn.classList.add('is-app');
          } else {
            if (downloadBtn) downloadBtn.style.display = '';
          }
        } catch (e) {
          if (downloadBtn) downloadBtn.style.display = '';
        }
      }
    }

    if (sharePageBtn) {
      sharePageBtn.addEventListener('click', handleSharePage);
    }

    document.addEventListener('DOMContentLoaded', initAppEnvironment);
  </script>
