
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f5f6f7" />
  <title>盘中异动·1分钟看懂</title>
  <style>
    :root {
      --bg: #f8f9fa;
      --card: #ffffff;
      --text-main: #18202c;
      --text-muted: #5d6574;
      --text-light: #8a93a1;
      --accent: #ff2442;
      --shadow-sm: 0 2px 8px rgba(20, 27, 38, 0.04);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background-color: var(--bg);
      color: var(--text-main);
      font-family: "Source Han Sans", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: min(100%, 480px);
      margin: 0 auto;
      padding-bottom: calc(120px + env(safe-area-inset-bottom));
    }

    /* === 吸顶头部与日历 === */
    .header-container {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(248, 249, 250, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.03);
    }

    .header__title {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 12px;
      padding: 0 4px;
      letter-spacing: -0.02em;
    }

    .calendar {
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid rgba(0, 0, 0, 0.04);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .calendar__toggle {
      width: 100%;
      appearance: none;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      cursor: pointer;
    }

    .calendar__toggle-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .calendar__icon { font-size: 18px; }

    .calendar__summary {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
    }

    .calendar__summary-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
    }

    .calendar__summary-value {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-main);
    }

    .calendar__toggle-arrow {
      color: var(--text-light);
      font-size: 12px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .calendar.is-open .calendar__toggle-arrow { transform: rotate(180deg); }

    .calendar__panel {
      display: none;
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      padding: 16px;
    }
    .calendar.is-open .calendar__panel { display: block; }

    .calendar__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .calendar__month-value { font-size: 16px; font-weight: 800; }

    .calendar__nav-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: #f0f2f5;
      color: var(--text-main);
      font-size: 16px;
      cursor: pointer;
    }

    .calendar__weekdays, .calendar__grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
    }

    .calendar__weekday {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 8px;
    }

    .calendar__cell {
      appearance: none;
      border: none;
      background: transparent;
      padding: 8px 0;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      position: relative;
    }

    .calendar__cell.is-outside { color: #c4c9d1; }
    .calendar__cell.is-active { background: var(--text-main); color: #fff; }
    .calendar__cell.is-today::after {
      content: "";
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* === 瀑布流内容区 === */
    .feed-container { padding: 16px 14px; }
    .date-section { margin-bottom: 32px; scroll-margin-top: 120px; }

    .date-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 16px;
      padding-left: 4px;
    }

    .date-header::before {
      content: '';
      display: block;
      width: 4px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    .waterfall {
      column-count: 2;
      column-gap: 10px;
    }

    .xhs-card {
      break-inside: avoid;
      background: var(--card);
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0,0,0,0.03);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .xhs-card:active { transform: scale(0.98); }

    /* 优化：固定 1:1 比例，并让图片顶部对齐以裁剪底部二维码 */
    .xhs-card__image {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: block;
      background: #f0f2f5;
      object-fit: cover;
      object-position: top; /* 关键修改：图片靠顶部对齐，超出部分从底部裁切 */
    }

    .xhs-card__body { padding: 10px 10px 14px; }

    .xhs-card__title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .xhs-card__desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .empty-state {
      text-align: center;
      padding: 40px 0;
      color: var(--text-light);
      font-size: 14px;
    }

    /* === 大图查看器 (Modal) === */
    .image-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 20, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .image-viewer.is-active {
      opacity: 1;
      pointer-events: auto;
    }

    .viewer-close {
      position: absolute;
      top: calc(16px + env(safe-area-inset-top));
      right: 16px;
      width: 36px;
      height: 36px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 300;
      cursor: pointer;
      z-index: 10;
    }

    .image-viewer__img-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .image-viewer__img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      transform: scale(0.95);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .image-viewer.is-active .image-viewer__img {
      transform: scale(1);
    }

    .disclaimer {
      margin: 0 14px 6px;
      padding: 0 4px 4px;
      background: transparent;
      border: none;
      box-shadow: none;
      color: var(--text-light);
      font-size: 11px;
      line-height: 1.55;
    }

    .disclaimer__title {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 2px;
    }

    .fixed-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(148, 163, 184, 0.25);
      box-shadow: 0 -5px 20px -5px rgba(0, 0, 0, 0.1);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .fixed-actions__inner {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 12px 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .action-btn {
      flex: 1;
      min-height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
      text-decoration: none;
      line-height: 1;
      user-select: none;
    }

    .action-btn:active {
      transform: scale(0.97);
      opacity: 0.92;
    }

    .action-btn--share {
      display: none;
      color: #f5d77a;
      background: linear-gradient(135deg, #0f172a, #111827);
      border: 1px solid rgba(245, 215, 122, 0.4);
    }

    .action-btn--share.is-app {
      display: flex;
    }

    .action-btn--download {
      color: #19202b;
      background: linear-gradient(90deg, #f8d46a 0%, #f2c94c 45%, #f8d46a 100%);
      box-shadow: 0 8px 18px rgba(242, 201, 76, 0.22);
    }

    .action-btn__text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .action-btn__subtext {
      font-size: 10px;
      font-weight: 500;
      opacity: 0.78;
      transform: scale(0.92);
    }

    .action-btn__icon {
      width: 16px;
      height: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header-container">
      <div class="header__title">盘中异动·1分钟看懂</div>
      <div class="calendar" id="calendarRoot">
        <button class="calendar__toggle" type="button" id="calendarToggle">
          <div class="calendar__toggle-left">
            <div class="calendar__icon">📅</div>
            <div class="calendar__summary">
              <div class="calendar__summary-title">定位到日期</div>
              <div class="calendar__summary-value" id="calendarSummary">2026年04月15日</div>
            </div>
          </div>
          <div class="calendar__toggle-arrow">▼</div>
        </button>

        <div class="calendar__panel" id="calendarPanel">
          <div class="calendar__head">
            <div class="calendar__month-value" id="calendarMonth">2026年4月</div>
            <div class="calendar__nav">
              <button class="calendar__nav-btn" type="button" id="prevMonth">‹</button>
              <button class="calendar__nav-btn" type="button" id="nextMonth">›</button>
            </div>
          </div>
          <div class="calendar__weekdays" id="calendarWeekdays"></div>
          <div class="calendar__grid" id="calendarGrid"></div>
        </div>
      </div>
    </header>

    <section class="feed-container" id="feedContainer"></section>
    <section class="disclaimer" aria-label="免责声明">
      <span class="disclaimer__title">免责声明</span>
      本页面内容仅供参考，不构成投资建议或交易依据。部分内容由人工智能技术辅助生成，可能存在识别、理解或表达偏差，请结合原始信息与专业判断使用。
    </section>
  </main>

  <div class="fixed-actions">
    <div class="fixed-actions__inner">
      <button class="action-btn action-btn--share" id="sharePageBtn" type="button">
        <span class="action-btn__icon" aria-hidden="true">↗</span>
        <span>分享专题</span>
      </button>
      <a class="action-btn action-btn--download" id="download-btn" href="https://qihuo.jin10.com/app/index.html" target="_blank" rel="noreferrer">
        <span class="action-btn__text">
          <span>下载金十期货APP</span>
          <span class="action-btn__subtext">全品种异动实时提醒</span>
        </span>
      </a>
    </div>
  </div>

  <div class="image-viewer" id="imageViewer">
    <div class="viewer-close" id="viewerClose">×</div>
    <div class="image-viewer__img-container" id="viewerImgContainer">
      <img class="image-viewer__img" id="viewerImg" src="" alt="大图预览">
    </div>
  </div>

  <script>
    const WEEKDAY_LABELS = ['日', '一', '二', '三', '四', '五', '六'];
    const currentYear = 2026;
    const currentMonthIndex = 3; 
    const todayKey = '2026-04-15';

    const cardStore = {
      '2026-04-15': [
        { title: '焦煤走强', desc: '日内单边上涨，收涨3.11%。触发：钢厂复产+铁水回升，原料补库需求增强；联动：焦煤上涨1.93%，黑色系共振偏强；基本面：焦煤库存周降33万吨，焦炭开启第二轮提涨，铁水产量回升；分歧：4蒙煤高供应+交割压力仍在，限制上方空间。', image: 'https://img.jin10.com/news/26/04/uvTabaEOkyzPecM-TdhOi.jpg' },
        { title: '生猪反弹', desc: '上涨3.27%，07合约一度触及涨停。触发：养殖端惜售+出栏节奏放缓，供应阶段性收缩；供给：出栏量下降、二次育肥结束；需求：五一备货启动、低价刺激消费；分歧：4月供应压力仍大，上行空间有限，供给仍过剩，中长期偏弱格局未改。', image: 'https://img.jin10.com/news/26/04/0uOaBVck_wVy4A2iZ7Y_T.jpg' },
        { title: 'PX走强', desc: '上涨3.99%，盘中一度更强。触发：多套PX装置检修+供应收缩，现货偏紧驱动上涨；联动：PTA上涨3.53%，聚酯链条整体走强；基本面：生意社数据显示PX现货上涨至1360-1370美元/吨，行业统计亚洲PX负荷较2月底下降10%-15%，PTA集中检修、库存去化；分歧：若美伊谈判顺利，油价回落或压制PX溢价。', image: 'https://img.jin10.com/news/26/04/uDyIUJoQZT1SNSsPbPdn-.jpg' },
        { title: '黄金反弹', desc: '盘中一度涨超7%，收涨4.82%。触发：美伊释放重返谈判信号+美元持续回落，贵金属迎来反弹；联动：沪金同步上涨1.16%，贵金属板块整体走强；基本面：美伊或重启谈判，地缘风险边际缓和，美国3月PPI同比4%（低于预期4.6%），通胀压力与政策预期博弈；分歧：大有期货认为，避险+工业属性共振，白银弹性更强，但市场也担忧美联储降息可能推迟，对贵金属形成扰动。', image: 'https://img.jin10.com/news/26/04/LCzTIYeIBftGRRy93hLEK.jpg' },
        { title: '集运欧线承压', desc: '下跌0.99%，盘中一度跌超3%。触发：即期运价持续下调，压制盘面情绪；运价：马士基/达飞/YML报价下调至约1800-2200美元/FEU；预期：wk18均价或降至2150美元附近；分歧：市场预期5月航司可能提价，对盘面形成托底。', image: 'https://img.jin10.com/news/26/04/TWE7EbkE3LgmVhtEeDdJM.jpg' },
        { title: 'SC原油下挫', desc: '回吐风险溢价，收盘下跌3.35%。触发：美伊谈判预期升温，地缘溢价回落；联动：燃料油（高硫/低硫）同步下跌超2%；基本面：美伊或开启第二轮谈判，霍尔木兹海峡已有船只恢复通行，IEA称3月供应减少1010万桶/日，同时下调需求预期；分歧：油价高位仍具粘性，短期转弱震荡，等待谈判进一步指引。', image: 'https://img.jin10.com/news/26/04/QwkQCr9Co_7MstuV0WL_Z.jpg' }
      ]
    };

    const state = {
      viewYear: currentYear,
      viewMonth: currentMonthIndex,
      selectedKey: todayKey
    };

    const calendarGrid = document.getElementById('calendarGrid');
    const calendarMonth = document.getElementById('calendarMonth');
    const calendarSummary = document.getElementById('calendarSummary');
    const calendarRoot = document.getElementById('calendarRoot');
    const calendarToggle = document.getElementById('calendarToggle');
    const calendarWeekdays = document.getElementById('calendarWeekdays');
    const feedContainer = document.getElementById('feedContainer');
    const sharePageBtn = document.getElementById('sharePageBtn');
    const downloadBtn = document.getElementById('download-btn');

    function formatFullDate(key) {
      const [year, month, day] = key.split('-');
      return `${year}年${parseInt(month)}月${parseInt(day)}日`;
    }

    function formatShortDate(key) {
      const [year, month, day] = key.split('-');
      return `${parseInt(month)}月${parseInt(day)}日`;
    }

    function dateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function buildMonthCells(year, monthIndex) {
      const firstDay = new Date(year, monthIndex, 1);
      const startWeekday = firstDay.getDay();
      const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
      const cells = [];

      for (let i = startWeekday - 1; i >= 0; i--) {
        const d = new Date(year, monthIndex, -i);
        cells.push({ date: d, outside: true });
      }
      for (let day = 1; day <= daysInMonth; day++) {
        cells.push({ date: new Date(year, monthIndex, day), outside: false });
      }
      while (cells.length % 7 !== 0) {
        cells.push({ date: new Date(year, monthIndex + 1, cells.length - startWeekday - daysInMonth + 1), outside: true });
      }
      return cells;
    }

    function renderCalendar() {
      calendarMonth.textContent = `${state.viewYear}年${state.viewMonth + 1}月`;
      calendarWeekdays.innerHTML = WEEKDAY_LABELS.map(l => `<div class="calendar__weekday">${l}</div>`).join('');

      const cells = buildMonthCells(state.viewYear, state.viewMonth);
      calendarGrid.innerHTML = cells.map(cell => {
        const key = dateKey(cell.date);
        const isActive = key === state.selectedKey;
        const isToday = key === todayKey;
        
        let classes = ['calendar__cell'];
        if (cell.outside) classes.push('is-outside');
        if (isActive) classes.push('is-active');
        if (isToday) classes.push('is-today');

        return `<button class="${classes.join(' ')}" data-date="${key}">${cell.date.getDate()}</button>`;
      }).join('');
    }

    function renderFeed() {
      const sortedDates = Object.keys(cardStore).sort((a, b) => new Date(b) - new Date(a));
      
      if (sortedDates.length === 0) {
        feedContainer.innerHTML = '<div class="empty-state">暂无盘中异动数据</div>';
        return;
      }

      let html = '';
      sortedDates.forEach(dateStr => {
        const items = cardStore[dateStr];
        const dateLabel = dateStr === todayKey ? `今天 (${formatShortDate(dateStr)})` : formatFullDate(dateStr);
        
        html += `
          <div class="date-section" id="section-${dateStr}">
            <div class="date-header">${dateLabel}</div>
            <div class="waterfall">
              ${items.map(item => `
                <article class="xhs-card" data-image="${item.image}">
                  <img class="xhs-card__image" src="${item.image}" alt="${item.title}" loading="lazy">
                  <div class="xhs-card__body">
                    <div class="xhs-card__title">${item.title}</div>
                    <div class="xhs-card__desc">${item.desc}</div>
                  </div>
                </article>
              `).join('')}
            </div>
          </div>
        `;
      });
      feedContainer.innerHTML = html;
    }

    calendarToggle.addEventListener('click', () => {
      calendarRoot.classList.toggle('is-open');
    });

    calendarGrid.addEventListener('click', (e) => {
      const btn = e.target.closest('.calendar__cell');
      if (!btn) return;
      
      const targetDate = btn.dataset.date;
      state.selectedKey = targetDate;
      calendarSummary.textContent = formatFullDate(targetDate);
      
      renderCalendar();
      calendarRoot.classList.remove('is-open');

      const targetSection = document.getElementById(`section-${targetDate}`);
      if (targetSection) {
        targetSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } else {
        alert(`${formatFullDate(targetDate)} 暂无数据`);
      }
    });

    document.getElementById('prevMonth').addEventListener('click', () => {
      state.viewMonth--;
      if (state.viewMonth < 0) { state.viewMonth = 11; state.viewYear--; }
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      state.viewMonth++;
      if (state.viewMonth > 11) { state.viewMonth = 0; state.viewYear++; }
      renderCalendar();
    });

    document.addEventListener('click', (e) => {
      if (calendarRoot.classList.contains('is-open') && !calendarRoot.contains(e.target)) {
        calendarRoot.classList.remove('is-open');
      }
    });

    renderCalendar();
    renderFeed();

    /* === 大图查看器交互逻辑 === */
    const imageViewer = document.getElementById('imageViewer');
    const viewerImg = document.getElementById('viewerImg');
    let currentImgUrl = '';

    // 监听卡片点击事件
    feedContainer.addEventListener('click', (e) => {
      const card = e.target.closest('.xhs-card');
      if (!card) return;
      
      const imgUrl = card.getAttribute('data-image');
      if (imgUrl) {
        currentImgUrl = imgUrl;
        viewerImg.src = imgUrl;
        imageViewer.classList.add('is-active');
      }
    });

    // 关闭查看器
    function closeViewer() {
      imageViewer.classList.remove('is-active');
      setTimeout(() => { viewerImg.src = ''; }, 300); // 等待动画结束后清空 src
    }

    document.getElementById('viewerClose').addEventListener('click', closeViewer);
    document.getElementById('viewerImgContainer').addEventListener('click', (e) => {
      // 点击图片外围区域也可以关闭
      if (e.target !== viewerImg) {
        closeViewer();
      }
    });

    function handleSharePage() {
      if (typeof window.Jin10JSBridge !== 'undefined') {
        try {
          const bridge = new window.Jin10JSBridge();
          if (bridge.isApp) {
            bridge.dispatch('appShare', { url: location.href });
            return;
          }
        } catch (e) {
          // Fall back to browser sharing below.
        }
      }

      if (navigator.share) {
        navigator.share({
          title: document.title,
          url: location.href
        }).catch(() => {});
        return;
      }

      navigator.clipboard.writeText(location.href).then(() => {
        alert('页面链接已复制到剪贴板！');
      }).catch(() => {
        alert('复制失败，请重试');
      });
    }

    function initAppEnvironment() {
      if (typeof window.Jin10JSBridge !== 'undefined') {
        try {
          const bridge = new window.Jin10JSBridge();
          if (bridge.isApp) {
            if (sharePageBtn) sharePageBtn.style.display = '';
            if (downloadBtn) downloadBtn.style.display = 'none';
            if (sharePageBtn) sharePageBtn.classList.add('is-app');
          } else {
            if (downloadBtn) downloadBtn.style.display = '';
          }
        } catch (e) {
          if (downloadBtn) downloadBtn.style.display = '';
        }
      }
    }

    if (sharePageBtn) {
      sharePageBtn.addEventListener('click', handleSharePage);
    }

    document.addEventListener('DOMContentLoaded', initAppEnvironment);
  </script>
</body>
</html>
